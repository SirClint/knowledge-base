services:
  api:
    build: ./api
    volumes:
      - ./vault:/vault
      - kb_data:/data
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - chromadb

  ui:
    build: ./ui
    ports:
      - "3000:80"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - kb_data:/chroma/chroma
    ports:
      - "8001:8000"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  kb_data:
  ollama_data:
  caddy_data:
