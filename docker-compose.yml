services:
  api:
    build: ./api
    volumes:
      - ./vault:/vault
      - kb_data:/data
    env_file: .env
    depends_on:
      - chromadb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ui:
    build: ./ui

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - kb_data:/chroma/chroma

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  kb_data:
  caddy_data:
